name: Publish Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-and-sync:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        id: version
        shell: bash
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish package
        shell: bash
        run: npm publish --access public --provenance

      - name: Commit version bump and tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "Shiryu Automation"
          git config user.email "automation@shiryustudios.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Sync published SDK to app repos
        run: node ./scripts/sync-app-sdk.mjs
        env:
          APPS_REPO_TOKEN: ${{ secrets.APPS_REPO_TOKEN }}
          GITHUB_ORG: Shiryu-Studios-LLC
          SDK_PACKAGE_NAME: "@shiryustudios/team-app-sdk"
          SDK_VERSION: ${{ steps.version.outputs.version }}
