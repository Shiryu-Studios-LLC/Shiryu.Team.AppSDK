name: Publish Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Capture current release tag
        id: before
        shell: bash
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Configure npm auth
        shell: bash
        run: |
          cat <<EOF > "$HOME/.npmrc"
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

      - name: Capture new release tag
        id: after
        shell: bash
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Sync published SDK to app repos
        if: steps.after.outputs.tag != '' && steps.after.outputs.tag != steps.before.outputs.tag
        run: node ./scripts/sync-app-sdk.mjs
        env:
          APPS_REPO_TOKEN: ${{ secrets.APPS_REPO_TOKEN }}
          GITHUB_ORG: Shiryu-Studios-LLC
          SDK_PACKAGE_NAME: "@shiryustudios/team-app-sdk"
          SDK_VERSION: ${{ steps.after.outputs.tag }}
